# RAG OpenWebUI — Docker Stack
#
# Usage:
#   docker compose up -d          # Start all services
#   docker compose down           # Stop all services
#   docker compose exec ollama ollama pull bge-m3

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "9627:8080"
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      - OLLAMA_BASE_URLS=http://ollama:11434
      - RAG_EMBEDDING_ENGINE=ollama
      - RAG_EMBEDDING_MODEL=bge-m3:latest
      - RAG_RERANKING_MODEL=BAAI/bge-reranker-v2-m3
      - ENABLE_RAG_HIBRID_SEARCH=True
      - RAG_SYSTEM_CONTEXT=true
      - EXTERNAL_WEB_LOADER_URL=http://crawl4ai-proxy:8001/crawl
      - EXTERNAL_WEB_LOADER_API_KEY=none
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-}
      - CORS_ALLOW_ORIGIN="*"
      - WEBUI_AUTH=True
      - ENABLE_SIGNUP=True
      - TZ=Asia/Jakarta
    depends_on:
      - ollama
      - tika
      - crawl4ai

  mcpo:
    image: ghcr.io/open-webui/mcpo:main
    container_name: mcpo
    ports:
      - "18000:8000"
    volumes:
      - ./mcpo-config.json:/app/config/config.json:ro
    environment:
      - BRAVE_API_KEY=${BRAVE_API_KEY}
    restart: unless-stopped

  tika:
    image: apache/tika:latest
    container_name: tika
    ports:
      - "9998:9998"
    restart: unless-stopped

  crawl4ai:
    image: unclecode/crawl4ai:latest
    container_name: crawl4ai
    ports:
      - "11235:11235"
    shm_size: "2gb"
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  open-webui-data:
  ollama-data:
