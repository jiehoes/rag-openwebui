# RAG OpenWebUI — Docker Stack
#
# Usage:
#   docker compose up -d          # Start all services
#   docker compose down           # Stop all services
#   docker compose exec ollama ollama pull bge-m3

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "9627:8080"
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      - OLLAMA_BASE_URLS=http://ollama:11434
      - RAG_EMBEDDING_ENGINE=ollama
      - RAG_EMBEDDING_MODEL=nomic-embed-text:latest
      - RAG_EMBEDDING_BATCH_SIZE=8
      - RAG_RERANKING_MODEL=BAAI/bge-reranker-v2-m3
      - ENABLE_RAG_HIBRID_SEARCH=True
      - RAG_SYSTEM_CONTEXT=true
      - CONTENT_EXTRACTION_ENGINE=tika
      - TIKA_SERVER_URL=http://tika:9998
      - EXTERNAL_WEB_LOADER_URL=http://crawl4ai:11235/crawl
      - EXTERNAL_WEB_LOADER_API_KEY=none
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-}
      - CORS_ALLOW_ORIGIN=*
      - WEBUI_AUTH=True
      - ENABLE_SIGNUP=True
      - ENABLE_WEB_SEARCH=true
      - WEB_SEARCH_ENGINE=brave
      - BRAVE_SEARCH_API_KEY=${BRAVE_API_KEY}
      - TZ=Asia/Jakarta
    depends_on:
      - ollama
      - tika
      - crawl4ai

  mcpo:
    image: ghcr.io/open-webui/mcpo:main
    container_name: mcpo
    command: >
      --config /app/config.json
      --port 8000
      --hot-reload
    volumes:
      - ./mcpo-config.json:/app/config.json:ro
    env_file:
      - .env
    restart: unless-stopped

  tika:
    image: apache/tika:3.3.0.0-full
    container_name: tika
    environment:
      - JAVA_OPTS=-Xmx2g -Xms512m
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9998/tika"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  crawl4ai:
    image: unclecode/crawl4ai:latest
    container_name: crawl4ai
    shm_size: "2gb"
    restart: unless-stopped

  open-terminal:
    image: ghcr.io/open-webui/open-terminal:0.11.34
    container_name: open-terminal
    stdin_open: true
    tty: true
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
    volumes:
      - ./open-terminal-data:/home/user
      - ./pip-cache:/home/user/.cache/pip
    environment:
      - TZ=Asia/Jakarta
      - OPEN_TERMINAL_MAX_SESSIONS=8
      - OPEN_TERMINAL_EXECUTE_TIMEOUT=30

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=-1
    restart: unless-stopped

volumes:
  open-webui-data:
  ollama-data:
